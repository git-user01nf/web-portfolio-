# fly.toml app configuration file generated for fulayiweb on 2026-06-14T19:47:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fulayiweb'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
